<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#4ca1af);
background-size:400% 400%;
animation:fondAnime 10s ease infinite;
overflow:hidden;
transition:0.5s;
}

@keyframes fondAnime{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Particles */
.particles{
position:absolute;
width:100%;
height:100%;
z-index:0;
}

.particles span{
position:absolute;
display:block;
width:6px;
height:6px;
background:white;
opacity:0.3;
border-radius:50%;
animation:move 10s linear infinite;
}

@keyframes move{
0%{transform:translateY(0) translateX(0);}
100%{transform:translateY(-100vh) translateX(50px);}
}

.container{
position:relative;
z-index:1;
width:90%;
max-width:420px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.5);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

img{
width:110px;
height:110px;
border-radius:50%;
border:3px solid white;
animation:photo 3s infinite ease-in-out;
}

@keyframes photo{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

h1,p{
color:white;
}

p{
margin-bottom:20px;
opacity:0.85;
}

/* Buttons */
a{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
text-decoration:none;
color:white;
padding:14px;
margin:10px 0;
border-radius:12px;
font-size:16px;
font-weight:bold;
transition:0.3s;
}

a:hover{
transform:scale(1.06);
box-shadow:0 0 18px rgba(255,255,255,0.5);
}

.facebook{background:#1877F2;}
.whatsapp{background:#25D366;}
.telegram{background:#0088cc;}
.youtube{background:#FF0000;}
.tiktok{background:#000;}
.twitter{background:#1DA1F2;}
.instagram{background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);}
.snapchat{background:#FFFC00;color:black;}
.email{
background:#EA4335;
color:white;
}

.email:hover{
background:#d93025;
transform:scale(1.05);
}
.newvideo{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
background:#FF0000;
color:white;
padding:15px;
border-radius:12px;
font-size:18px;
font-weight:bold;
text-decoration:none;
transition:.3s;
}

.newvideo:hover{
transform:scale(1.05);
box-shadow:0 0 15px rgba(255,0,0,.6);
}

.badge{
background:#FFD700;
color:#000;
padding:3px 8px;
border-radius:20px;
font-size:12px;
font-weight:bold;
animation:blink 1s infinite;
}

@keyframes blink{
50%{
opacity:.4;
}
}

/* Toggle button */
.toggle{
position:absolute;
top:15px;
right:15px;
background:white;
border:none;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* Dark mode */
.dark{
background:#0b0f1a !important;
}

.dark .container{
background:rgba(255,255,255,0.08);
}

footer{
margin-top:15px;
font-size:13px;
color:white;
opacity:0.8;
}

</style>

<script>
